<!DOCTYPE html>
<html>
<head>
    <title>Привязка аккаунта</title>
</head>
<body style="font-family:sans-serif; text-align:center; margin-top:100px;">

<h1>Привязка аккаунта</h1>

<input id="token" placeholder="Введи код">
<br><br>
<button onclick="link()">Привязать</button>

<p id="result"></p>

<script>
async function link() {
    const token = document.getElementById("token").value;

    const res = await fetch("http://localhost:3000/link", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (data.success) {
        document.getElementById("result").innerText =
            "Успешно! Ник: " + data.user.username;
    } else {
        document.getElementById("result").innerText = "Неверный код";
    }
}
</script>

</body>
</html>
