<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLEVER Shop</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
  color: white;
}

header {
  padding: 30px;
  text-align: center;
  background: #111;
}

h1 {
  color: orange;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: #222;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

button {
  background: orange;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  cursor: pointer;
}

.form {
  margin-top: 50px;
  background: #222;
  padding: 20px;
  border-radius: 12px;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 6px;
  border: none;
}
</style>
</head>
<body>

<header>
  <h1>KLEVER SERVER</h1>
  <p>IP: 185.9.145.187:30043</p>
</header>

<div class="container">

<h2>Магазин</h2>
<div class="grid">

<div class="card">
  <h3>VIP</h3>
  <p>100 ₽</p>
  <button onclick="buy('VIP')">Купить</button>
</div>

<div class="card">
  <h3>PREMIUM</h3>
  <p>300 ₽</p>
  <button onclick="buy('PREMIUM')">Купить</button>
</div>

<div class="card">
  <h3>ADMIN</h3>
  <p>1000 ₽</p>
  <button onclick="buy('ADMIN')">Купить</button>
</div>

</div>

<div class="form">
  <h2>Заявка</h2>
  <input type="text" id="nick" placeholder="Ваш ник">
  <input type="text" id="age" placeholder="Возраст">
  <textarea id="text" placeholder="Почему хотите на сервер"></textarea>
  <button onclick="sendApp()">Отправить</button>
</div>

</div>

<script>

function buy(item) {
  const nick = prompt("Введите ник");
  alert("Покупка " + item + " для " + nick);
}

function sendApp() {
  const nick = document.getElementById('nick').value;
  const age = document.getElementById('age').value;
  const text = document.getElementById('text').value;

  fetch("https://discord.com/api/webhooks/1484577768401408002/V9fGpUF4FXO5DYNULvQgXimjnte8bfHHkSmJ9x3-gRGM32O6vMy98N54qKR1_s4E0j2E", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      embeds: [{
        title: "Новая заявка",
        color: 16753920,
        fields: [
          { name: "Ник", value: nick },
          { name: "Возраст", value: age },
          { name: "Причина", value: text }
        ],
        timestamp: new Date()
      }]
    })
  });

  alert("Заявка отправлена!");
}

</script>

</body>
</html>
